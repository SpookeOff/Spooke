<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spooke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --navy:    #0f172a;
      --violet:  #7c3aed;
      --blue:    #3b82f6;
      --violet2: #a855f7;
      --blue2:   #60a5fa;
      --white:   #f8fafc;
      --glass-bg: rgba(15, 23, 42, 0.55);
      --glass-border: rgba(124, 58, 237, 0.35);
      --glow-v: 0 0 20px rgba(124,58,237,0.7), 0 0 60px rgba(124,58,237,0.3);
      --glow-b: 0 0 20px rgba(59,130,246,0.7), 0 0 60px rgba(59,130,246,0.3);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* ── Loading Screen ── */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }

    .loader-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--white);
      text-shadow: var(--glow-v);
      animation: pulse-text 1.5s ease-in-out infinite;
    }

    .loader-bar-wrap {
      width: min(340px, 80vw);
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(124,58,237,0.2);
    }
    .loader-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--violet), var(--blue), var(--violet2));
      background-size: 200% 100%;
      animation: bar-fill 2.2s cubic-bezier(0.4,0,0.2,1) forwards,
                 gradient-shift 1.5s linear infinite;
      box-shadow: 0 0 12px rgba(124,58,237,0.8);
    }

    .loader-dots {
      display: flex; gap: 8px;
    }
    .loader-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--violet);
      animation: dot-bounce 1.2s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(124,58,237,0.9);
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.9); }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bar-fill { to { width: 100%; } }
    @keyframes gradient-shift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes pulse-text { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes dot-bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    /* ── Noise grain overlay ── */
    #grain {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      opacity: 0.045;
    }

    /* ── Video Background ── */
    #bg-video {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #bg-overlay {
      position: fixed; inset: 0; z-index: 2;
      background: rgba(0,0,0,0.6);
    }

    /* ── Particles ── */
    #particles {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: none;
    }

    /* ── Main layout ── */
    #app {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0;
      animation: fade-in 1s ease 2.8s forwards;
    }

    @keyframes fade-in { to { opacity: 1; } }

    /* ── Glass Card ── */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: clamp(32px, 6vw, 56px) clamp(28px, 8vw, 72px);
      width: min(560px, 96vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.15),
        0 8px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: float 6s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.8), rgba(59,130,246,0.8), transparent);
    }
    .card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* ── Name ── */
    .name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, var(--violet2) 40%, var(--blue) 70%, #fff 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: name-gradient 4s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(124,58,237,0.6)) drop-shadow(0 0 60px rgba(59,130,246,0.3));
    }

    @keyframes name-gradient {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-top: -20px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.5), rgba(59,130,246,0.5), transparent);
    }

    /* ── Social Links ── */
    .socials {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      text-decoration: none;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .social-link:hover {
      transform: translateX(6px);
      border-color: var(--accent, rgba(124,58,237,0.5));
      background: rgba(124,58,237,0.08);
    }
    .social-link:hover .social-icon {
      filter: drop-shadow(0 0 8px var(--accent, rgba(124,58,237,0.9)));
      transform: scale(1.15);
    }
    .social-link:hover .social-name {
      color: var(--accent-text, var(--violet2));
    }
    .social-link:hover { box-shadow: var(--glow-v), inset 0 0 0 1px rgba(124,58,237,0.3); }

    .social-icon {
      width: 22px; height: 22px;
      flex-shrink: 0;
      transition: all 0.3s ease;
      opacity: 0.9;
    }

    .social-name {
      flex: 1;
      transition: color 0.3s ease;
    }

    .social-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      color: var(--violet2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Platform colors */
    .yt  { --accent: rgba(255,0,0,0.6);      --accent-text: #ff4444; }
    .sp  { --accent: rgba(30,215,96,0.6);    --accent-text: #1db954; }
    .tw  { --accent: rgba(145,70,255,0.6);   --accent-text: #9146ff; }
    .dc  { --accent: rgba(88,101,242,0.6);   --accent-text: #7289da; }
    .ig  { --accent: rgba(255,165,0,0.6);    --accent-text: #ffa500; }

    .yt:hover  { box-shadow: 0 0 20px rgba(255,0,0,0.4), inset 0 0 0 1px rgba(255,0,0,0.3); }
    .sp:hover  { box-shadow: 0 0 20px rgba(30,215,96,0.4), inset 0 0 0 1px rgba(30,215,96,0.3); }
    .tw:hover  { box-shadow: 0 0 20px rgba(145,70,255,0.4), inset 0 0 0 1px rgba(145,70,255,0.3); }
    .dc:hover  { box-shadow: 0 0 20px rgba(88,101,242,0.4), inset 0 0 0 1px rgba(88,101,242,0.3); }
    .ig:hover  { box-shadow: 0 0 20px rgba(255,165,0,0.4), inset 0 0 0 1px rgba(255,165,0,0.3); }

    /* ── Music Player ── */
    .music-player {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.2);
    }

    #play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(124,58,237,0.5);
      background: rgba(124,58,237,0.2);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
      padding: 0;
    }
    #play-btn:hover {
      background: rgba(124,58,237,0.4);
      box-shadow: 0 0 16px rgba(124,58,237,0.6);
      transform: scale(1.1);
    }
    #play-btn svg { width: 14px; height: 14px; }

    .music-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .music-label span {
      color: var(--violet2);
    }

    .volume-wrap {
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }

    .vol-icon { width: 14px; height: 14px; opacity: 0.5; }

    #volume {
      -webkit-appearance: none;
      appearance: none;
      width: 72px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }
    #volume::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--violet2);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(168,85,247,0.8);
      transition: transform 0.2s;
    }
    #volume::-webkit-slider-thumb:hover { transform: scale(1.3); }

    /* ── Visualizer bars ── */
    .visualizer {
      display: flex; align-items: flex-end; gap: 3px;
      height: 18px; flex-shrink: 0;
    }
    .vis-bar {
      width: 3px; border-radius: 2px;
      background: linear-gradient(to top, var(--violet), var(--blue));
      animation: vis-dance 0.8s ease-in-out infinite;
      box-shadow: 0 0 4px rgba(124,58,237,0.6);
    }
    .vis-bar:nth-child(1) { height: 6px;  animation-duration: 0.7s; }
    .vis-bar:nth-child(2) { height: 12px; animation-duration: 0.9s; animation-delay: 0.1s; }
    .vis-bar:nth-child(3) { height: 8px;  animation-duration: 0.6s; animation-delay: 0.2s; }
    .vis-bar:nth-child(4) { height: 14px; animation-duration: 1.0s; animation-delay: 0.05s; }
    .vis-bar:nth-child(5) { height: 5px;  animation-duration: 0.75s; animation-delay: 0.15s; }
    .paused .vis-bar { animation-play-state: paused; }

    @keyframes vis-dance {
      0%,100% { transform: scaleY(1); }
      50% { transform: scaleY(0.2); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { gap: 22px; }
      .social-link { padding: 10px 14px; font-size: 0.9rem; }
      .music-label { display: none; }
      #volume { width: 56px; }
    }
  </style>
</head>

    </div>
  </main>

  <script>
    /* ── Loader ── */
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 2600);
    });

    /* ── Grain canvas ── */
    const grain = document.getElementById('grain');
    const gCtx  = grain.getContext('2d');
    let grainFrame;

    function resizeGrain() {
      grain.width  = window.innerWidth;
      grain.height = window.innerHeight;
    }

    function drawGrain() {
      const w = grain.width, h = grain.height;
      const img = gCtx.createImageData(w, h);
      const data = img.data;
      for (let i = 0; i < data.length; i += 4) {
        const v = Math.random() * 255 | 0;
        data[i] = data[i+1] = data[i+2] = v;
        data[i+3] = 255;
      }
      gCtx.putImageData(img, 0, 0);
      grainFrame = requestAnimationFrame(drawGrain);
    }

    resizeGrain();
    drawGrain();
    window.addEventListener('resize', resizeGrain);

    /* ── Particles ── */
    const pCanvas = document.getElementById('particles');
    const pCtx    = pCanvas.getContext('2d');
    let particles = [];

    function resizeParticles() {
      pCanvas.width  = window.innerWidth;
      pCanvas.height = window.innerHeight;
    }

    function createParticle() {
      return {
        x: Math.random() * pCanvas.width,
        y: Math.random() * pCanvas.height,
        r: Math.random() * 1.8 + 0.3,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -(Math.random() * 0.4 + 0.1),
        alpha: Math.random() * 0.5 + 0.1,
        color: Math.random() > 0.5 ? '124,58,237' : '59,130,246',
        life: Math.random() * 200 + 100,
        maxLife: 0,
      };
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        const p = createParticle();
        p.maxLife = p.life;
        particles.push(p);
      }
    }

    function animateParticles() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      particles.forEach((p, i) => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.life--;

        const fade = Math.min(p.life / 30, (p.maxLife - p.life) / 30, 1);
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pCtx.fillStyle = `rgba(${p.color},${p.alpha * fade})`;
        pCtx.fill();

        if (p.life <= 0 || p.y < -10 || p.x < -10 || p.x > pCanvas.width + 10) {
          particles[i] = createParticle();
          particles[i].maxLife = particles[i].life;
        }
      });
      requestAnimationFrame(animateParticles);
    }

    resizeParticles();
    initParticles();
    animateParticles();
    window.addEventListener('resize', () => { resizeParticles(); initParticles(); });

    /* ── Music Player ── */
    const music    = document.getElementById('music');
    const playBtn  = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon= document.getElementById('pause-icon');
    const volSlider= document.getElementById('volume');
    const vis      = document.getElementById('vis');
    let playing    = false;

    music.volume = 0.5;

    playBtn.addEventListener('click', () => {
      if (playing) {
        music.pause();
        playIcon.style.display  = '';
        pauseIcon.style.display = 'none';
        vis.classList.add('paused');
      } else {
        music.play().catch(() => {});
        playIcon.style.display  = 'none';
        pauseIcon.style.display = '';
        vis.classList.remove('paused');
      }
      playing = !playing;
    });

    volSlider.addEventListener('input', () => {
      music.volume = volSlider.value;
    });
  </script>
</body>
</html>
